{% extends 'base.html' %}

{% block header %}
  <h1>{% block title %}New Post{% endblock %}</h1>
{% endblock %}

{% block content %}
  <form method="post">
    <label for="titulo">Titulo da música</label>
    <input name="titulo" id="titulo" value="{{ request.form['titulo'] }}" required>
    <label for="artista">Nome do Artista</label>
    <input name="artista" id="artista" value="{{ request.form['artista'] }}" required>
    <label for="comentario">Faça um comentário</label>
    <textarea name="comentario" id="comentario">{{ request.form['comentario'] }}</textarea>
    <input type="submit" value="Salvar">
  </form>
{% endblock %}
