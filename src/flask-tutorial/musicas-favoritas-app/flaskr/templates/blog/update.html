{% extends 'base.html' %}

{% block header %}
  <h1>{% block title %}Editar "{{ post['titulo'] }}"{% endblock %}</h1>
{% endblock %}

{% block content %}
  <form method="post">
    <label for="titulo">Titulo da Música</label>
    <input name="titulo" id="titulo"
      value="{{ request.form['titulo'] or post['titulo'] }}" required>
    <label for="artista">Nome do Artista</label>
    <input name="artista" id="artista"
      value="{{ request.form['artista'] or post['artista'] }}" required>
    <label for="comentario">Comentario</label>
    <textarea name="comentario" id="comentario">{{ request.form['comentario'] or post['comentario'] }}</textarea>
    <input type="submit" value="Salvar">
  </form>
  <hr>
  <form action="{{ url_for('blog.delete', id=post['id']) }}" method="post">
    <input class="danger" type="submit" value="Excluir" onclick="return confirm('Tem Certeza??');">
  </form>
{% endblock %}
